<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OtoFarma — Hearing Test Wireframes</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f6f3ec;
    --paper-2: #efeadf;
    --rule: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #2f6fd6;
  }
  html, body { background: var(--paper); color: var(--ink); }
  body { font-family: 'Inter', system-ui, sans-serif; }
  .hand { font-family: 'Kalam', cursive; }
  .hand-tight { font-family: 'Caveat', cursive; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Sketchy borders (used everywhere). */
  .sk        { border: 1.5px solid var(--rule); border-radius: 14px 18px 12px 20px / 18px 12px 20px 14px; }
  .sk-soft   { border: 1.25px solid var(--rule); border-radius: 9px 14px 8px 12px / 12px 8px 14px 9px; }
  .sk-pill   { border: 1.5px solid var(--rule); border-radius: 999px; }
  .sk-circle { border: 1.5px solid var(--rule); border-radius: 50%; }
  .sk-dashed { border: 1.5px dashed var(--rule); border-radius: 12px 16px 10px 18px / 16px 10px 18px 12px; }
  .sk-thick  { border: 2.5px solid var(--rule); border-radius: 14px 18px 12px 20px / 18px 12px 20px 14px; }

  .shadow-sk { box-shadow: 3px 3px 0 var(--rule); }
  .shadow-sk-sm { box-shadow: 2px 2px 0 var(--rule); }

  /* Slightly hand-wobbled rotations for variation cards */
  .wob-1 { transform: rotate(-0.35deg); }
  .wob-2 { transform: rotate(0.25deg); }
  .wob-3 { transform: rotate(-0.15deg); }

  /* Repeating diagonal hatch for placeholders */
  .hatch {
    background-image: repeating-linear-gradient(
      135deg,
      rgba(26,26,26,0.0) 0 6px,
      rgba(26,26,26,0.12) 6px 7px
    );
  }
  .hatch-dense {
    background-image: repeating-linear-gradient(
      135deg,
      rgba(26,26,26,0.0) 0 4px,
      rgba(26,26,26,0.18) 4px 5px
    );
  }

  /* Tab look */
  .tab {
    font-family: 'Kalam', cursive;
    border: 1.5px solid var(--rule);
    border-bottom: none;
    border-radius: 14px 18px 0 0 / 18px 12px 0 0;
    padding: .5rem 1rem .55rem;
    background: var(--paper-2);
    cursor: pointer;
    position: relative;
    top: 1px;
  }
  .tab.active {
    background: var(--paper);
    box-shadow: 0 2px 0 var(--paper);
    transform: translateY(-2px);
  }

  /* Underline scribble */
  .scribble {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='10' viewBox='0 0 160 10'><path d='M2 6 Q 20 1, 38 5 T 78 5 T 118 5 T 158 4' fill='none' stroke='%231a1a1a' stroke-width='1.6' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: 0 100%;
    background-size: 100% 8px;
    padding-bottom: 6px;
  }

  /* Subtle paper grain */
  .paper-grain::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(26,26,26,0.035) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 0;
  }

  /* Phone frame */
  .phone {
    width: 280px;
    height: 560px;
    border: 2px solid var(--rule);
    border-radius: 36px 38px 36px 38px / 40px 36px 40px 36px;
    position: relative;
    background: var(--paper);
    overflow: hidden;
  }
  .phone .notch {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 6px; border-radius: 999px; background: var(--rule);
  }
</style>
</head>
<body class="paper-grain">

<div id="root" class="relative z-10"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
