<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OtoFarma · Hearing Test</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg:      #f6f5f1;
    --surface: #ffffff;
    --ink:     #14181f;
    --ink-2:   #3b424d;
    --muted:   #6b727d;
    --line:    #e6e3da;
    --line-2:  #d9d5c8;
    --accent:  #0f8a7a;
    --accent-soft: #d6ece8;
    --warn:    #b4781a;
    --danger:  #b14545;
  }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
  }
  .mono   { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .serif  { font-family: 'Fraunces', Georgia, serif; }
  .num    { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  /* Soft elevation tokens */
  .card    { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; }
  .card-lg { background: var(--surface); border: 1px solid var(--line); border-radius: 28px; box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 30px 60px -30px rgba(20,24,31,.18); }

  /* Smooth screen transitions (transform only — opacity stays 1 so still-frame
     capture tools render content even mid-animation) */
  .scene-enter { animation: slideUp .42s cubic-bezier(.22,1,.36,1) both; }
  @keyframes slideUp {
    from { transform: translateY(10px); }
    to   { transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .scene-enter { animation: none; }
  }

  /* Tone-playing pulse */
  @keyframes pulse-ring {
    0%   { transform: scale(0.85); opacity: .55; }
    70%  { transform: scale(1.6);  opacity: 0;   }
    100% { transform: scale(1.6);  opacity: 0;   }
  }
  .pulse-ring { animation: pulse-ring 1.8s cubic-bezier(.4,0,.2,1) infinite; }

  /* Tone-playing core blob breathe */
  @keyframes breathe {
    0%, 100% { transform: scale(1);    }
    50%      { transform: scale(1.04); }
  }
  .breathe { animation: breathe 2s ease-in-out infinite; }

  /* Plot line draw */
  @keyframes draw {
    from { stroke-dashoffset: var(--len, 800); }
    to   { stroke-dashoffset: 0; }
  }
  .plot-line {
    stroke-dasharray: var(--len, 800);
    stroke-dashoffset: var(--len, 800);
    animation: draw 1.1s cubic-bezier(.22,1,.36,1) .15s forwards;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(.4); }
    to   { opacity: 1; transform: scale(1);  }
  }
  .plot-point { transform-origin: center; animation: pop .35s cubic-bezier(.22,1,.36,1) both; }

  /* Big tappable hero button */
  .hero-btn {
    background: var(--ink);
    color: var(--surface);
    border-radius: 999px;
    transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
    box-shadow: 0 14px 30px -14px rgba(20,24,31,.6);
  }
  .hero-btn:hover    { transform: translateY(-1px); }
  .hero-btn:active   { transform: translateY(1px); box-shadow: 0 6px 14px -8px rgba(20,24,31,.6); }
  .hero-btn[disabled]{ background: #b9bcc2; box-shadow: none; cursor: not-allowed; }

  .accent-btn {
    background: var(--accent);
    color: white;
    border-radius: 999px;
  }

  /* dB tick bar */
  .ticks { background-image: linear-gradient(to right, var(--line) 1px, transparent 1px); background-size: 10% 100%; }

  /* Focus ring */
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* Page wrapper - phone-like */
  .stage {
    width: min(420px, calc(100vw - 24px));
    margin: 0 auto;
  }

  /* Subtle background pattern */
  .bg-grid {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(20,24,31,0.06) 1px, transparent 0);
    background-size: 22px 22px;
  }
</style>
</head>
<body class="bg-grid">

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hifi.jsx"></script>
</body>
</html>
